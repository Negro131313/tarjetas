<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prática de Português</title>


    
<style>
body{
    font-family: Arial, sans-serif;
    text-align: center;
    background:#eef3f7;
    margin:0;
}

h1{
    margin-top:20px;
}

#info{
    margin:10px;
    font-size:18px;
}

.grid{
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 20px auto;
}

.card{
    background: white;
    border: 1px solid #ccc;
    border-radius: 10px;
    padding: 15px;
    width: 300px;
    text-align: center;
}

.card img{
    width:250px;
    height:250px;
    object-fit:contain;
}

input{
    width:220px;
    padding:8px;
    font-size:20px;
    text-align:center;
    margin-top:10px;
}

.correcto{
    background:#c8ffc8;
}

.incorrecto{
    background:#ffc8c8;
}

button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
    margin:10px;
}
</style>

</head>
<body>

<h1>Escreva a palavra em português</h1>

<div id="info">Carregando...</div>

<div class="grid" id="grid"></div>

<button onclick="skip()">Skip</button>

<script>

const carpeta = "cards/";
let imagenes = [];
let actuales = [];
let usadas = new Set();
let completadas = 0;

// Normalizar texto
function normalizar(texto){
    return texto
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
}

// Cargar JSON
fetch("imagenes.json")
.then(r => r.json())
.then(data => {
    imagenes = data;
    siguienteRonda();
});

// Crear nueva ronda
function siguienteRonda(){

    if(usadas.size === imagenes.length){
        document.getElementById("info").innerText = "¡Terminaste todas!";
        return;
    }

    const disponibles = imagenes.filter(i => !usadas.has(i));

   actuales = [...disponibles]
    .sort(() => Math.random() - 0.5)
    .slice(0,1);

    actuales.forEach(i => usadas.add(i));

    render();
}

// Renderizar tarjetas
function render(){

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    document.getElementById("info").innerText =
        `Restantes: ${imagenes.length - usadas.size}`;

    actuales.forEach((img, index)=>{

        const nombre = img.replace(/\.[^.]+$/, "");

        grid.innerHTML += `
        <div class="card">
            <img src="${carpeta}${img}">
            <br>
            <input id="inp${index}" oninput="verificar(${index}, '${nombre}')">
        </div>
        `;
    });
}

// Verificación automática
function verificar(index, correcta){

    const input = document.getElementById("inp" + index);

    if(normalizar(input.value) === normalizar(correcta)){
        input.classList.add("correcto");
        input.classList.remove("incorrecto");
        input.disabled = true;

        comprobarRonda();
    }
}

// Ver si toda la ronda está completa
function comprobarRonda(){

    const inputs = document.querySelectorAll("input");

    const todosCorrectos = [...inputs].every(i => i.disabled);

    if(todosCorrectos){
        setTimeout(() => {
            siguienteRonda();
        }, 600);
    }
}

// SKIP
function skip(){

    actuales.forEach((img, index)=>{
        const nombre = img.replace(/\.[^.]+$/, "");
        const input = document.getElementById("inp" + index);

        input.value = nombre;
        input.classList.add("incorrecto");
        input.disabled = true;
    });

    setTimeout(() => {
        siguienteRonda();
    }, 1900);
}

</script>

</body>
</html>
